<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Sound Way Simulation</title>
    <link rel="stylesheet" href="web.css">
    <style>
        /* หน้าจอเรดาร์ */
        #radar-screen {
            width: 600px;
            height: 400px;
            background-color: skyblue;
            border-radius: 20px;
            position: relative;
            /* สำคัญ: เพื่อให้วัตถุข้างในอ้างอิงตำแหน่งได้ */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 4px solid #333;
        }

        /* ปรับแต่งตัวผู้ใช้ (User) */
        .user {
            width: 50px;
            height: 50px;
            position: absolute;
            z-index: 10;
            transition: transform 0.1s;
            /* คุณสามารถแก้ CSS ตรงนี้ได้เลย เช่นใส่เงาหรือเปลี่ยนรูป */
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
            transform: scaleY(-1);
        }

        /* ปรับแต่งวัตถุจำลอง (Objects) */
        .sim-object {
            position: absolute;
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .sim-object img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ชื่อวัตถุที่ลอยอยู่บนหัว */
        .object-label {
            color: white;
            font-size: 10px;
            white-space: nowrap;
            margin-bottom: 2px;
            background: rgba(0, 0, 0, 0.5);
            padding: 1px 4px;
            border-radius: 4px;
        }

        /* เอฟเฟกต์เมื่อเข้าใกล้ (ToF Detected) */
        .detected-emergency {
            filter: drop-shadow(0 0 10px red) brightness(1.2);
            animation: blink 0.5s infinite alternate;
        }

        #about {
            width: 100%;
            height: 100vh;
            background-color: var(--cream);
            color: var(--gray-text);
            margin: 0;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes blink {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.7;
            }
        }

        /* รัศมีการตรวจจับ */
        .zone {
            position: absolute;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .zone-ai {
            width: 500px;
            height: 500px;
            background: var(--ai-zone-color);
            border: 1px dashed rgba(255, 255, 255, 0.2);
            animation: beep 1s ease-in-out infinite;
        }

        .zone-tof {
            width: 170px;
            height: 170px;
            background: var(--tof-zone-color);
            border: 1px solid rgba(255, 70, 70, 0.3);
            animation: beep 1s ease-in-out infinite;
        }

        @keyframes beep {
            0% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.5;
            }
        }

        /* ส่วนควบคุมและ Log */
        .controls {
            margin: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        #alertBox {
            width: 600px;
            height: 150px;
            background: #222;
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            overflow-y: auto;
            font-family: monospace;
            margin-top: 20px;
        }

        .alert-ai {
            color: #ffca28;
        }

        .alert-tof {
            color: #ff5252;
            font-weight: bold;
        }
    </style>
</head>

    <script>

        // navbar toggle
        const menu = document.querySelector('#mobile-menu');
        const navList = document.querySelector('.nav-list');

        menu.addEventListener('click', function () {
            // สลับการเพิ่ม/ลบ class 'active'
            navList.classList.toggle('active');

            // เสริม: ใส่ Animation ให้ปุ่มสามขีดเปลี่ยนเป็นตัว X (ถ้าต้องการ)
            menu.classList.toggle('is-active');
        });

        // end of navbar toggle

        const screen = document.getElementById('radar-screen');
        const userEl = document.getElementById('user-element');
        const alertBox = document.getElementById('alertBox');

        // การตั้งค่าตำแหน่ง (หน่วยเป็นพิกเซล)
        const config = {
            width: 600,
            height: 400,
            userX: 300,
            userY: 350,
            aiRadius: 250,
            tofRadius: 85
        };

        // จัดการรูปภาพ
        const imageMap = {
            'รถยนต์': 'img/car.png',
            'คนเดิน': 'img/person_walk.png',
            'เสาไฟฟ้า': 'img/eletric_column.png',
            'มอเตอร์ไซค์': 'img/bike.png',
            'จักรยาน': 'img/bikecycle.png',
            'สุนัข': 'img/dog.png',
            'ถังขยะ': 'img/bin.png',
            'คนวิ่ง': 'img/the_flash.png',
            'ป้ายจราจร': 'img/sign.png',
            'กระจกใส': 'img/glass.png',
            'default': ''
        };

        // วางตำแหน่งเริ่มต้นให้ User และ Zone
        userEl.style.left = `${config.userX - 25}px`;
        userEl.style.top = `${config.userY - 25}px`;
        document.getElementById('ai-circle').style.left = `${config.userX}px`;
        document.getElementById('ai-circle').style.top = `${config.userY}px`;
        document.getElementById('tof-circle').style.left = `${config.userX}px`;
        document.getElementById('tof-circle').style.top = `${config.userY}px`;

        // --- [ส่วนที่ 2: JavaScript Class สำหรับจัดการวัตถุ] ---
        class SimObject {
            constructor(name, x, y, speed) {
                this.name = name;
                this.x = x;
                this.y = y;
                this.speed = speed;
                this.isDead = false;
                this.detectedAI = false;
                this.detectedToF = false;

                // สร้าง HTML Element สำหรับวัตถุนี้
                this.el = document.createElement('div');
                this.el.className = 'sim-object';
                this.el.innerHTML = `
                    <span class="object-label">${name}</span>
                    <img src="${imageMap[name] || imageMap['default']}">
                `;
                screen.appendChild(this.el);
                this.updateDOM();
            }

            update() {
                // คำนวณการเคลื่อนที่
                let dx = config.userX - this.x;
                let dy = config.userY - this.y;
                let dist = Math.hypot(dx, dy);

                if (this.speed > 2) { // วัตถุที่เคลื่อนที่ได้จะเดินเข้าหา User
                    let angle = Math.atan2(dy, dx);
                    this.x += Math.cos(angle) * this.speed;
                    this.y += Math.sin(angle) * this.speed;
                } else {
                    this.y += 1; // จำลอง User เดินเข้าหาวัตถุที่อยู่นิ่ง
                }

                // ตรวจจับระยะ AI
                if (dist < config.aiRadius && !this.detectedAI) {
                    this.detectedAI = true;
                    let side = this.x < config.userX ? 'ซ้าย' : 'ขวา';
                    log(`🔊 [AI]: มี ${this.name} ทาง${side}`, 'alert-ai');
                }

                // ตรวจจับระยะ ToF
                if (dist < config.tofRadius && !this.detectedToF) {
                    this.detectedToF = true;
                    this.el.classList.add('detected-emergency'); // ใช้ CSS Class ในการเปลี่ยนสี/ใส่เงา
                    let side = this.x < config.userX ? 'ซ้าย' : 'ขวา';
                    if (this.name === 'กระจกใส') {
                        log(`🚨 [AI]: มี ${this.name} ทาง${side}`, 'alert-tof');
                    } else {
                        log(`🚨 [BEEP]: ${this.name} ประชิดตัวทาง${side}!`, 'alert-tof');
                    }
                }

                // ตรวจสอบการชน
                if (dist < 35) {
                    log(`💥 ชนกับ ${this.name}!`, 'white');
                    this.destroy();
                }

                // ตรวจสอบการหลุดขอบจอ
                if (this.y > config.height + 50) this.destroy();

                this.updateDOM();
            }

            updateDOM() {
                if (this.isDead) return;
                this.el.style.left = `${this.x - 20}px`;
                this.el.style.top = `${this.y - 20}px`;
            }

            destroy() {
                this.isDead = true;
                this.el.remove();
            }
        }

        let activeObjects = [];

        function spawn(name) {
            let x = name === 'รถยนต์' ? 100 : (name === 'คนเดิน' ? 500 : 300);
            activeObjects.push(new SimObject(name, x, -50, name === 'เสาไฟฟ้า' ? 0 : 4));
        }

        function spawnRandom() {
            const list = ['มอเตอร์ไซค์', 'จักรยาน', 'สุนัข', 'ถังขยะ', 'คนวิ่ง', 'ป้ายจราจร', 'กระจกใส'];
            let name = list[Math.floor(Math.random() * list.length)];
            let rx = Math.random() * 500 + 50;

            let rs;
            if (name === 'ถังขยะ' || name === 'ป้ายจราจร' || name === 'กระจกใส') rs = 0;
            else rs = Math.random() * 5;
            activeObjects.push(new SimObject(name, rx, -50, rs));
        }

        function log(msg, cls) {
            let d = document.createElement('div');
            d.className = cls;
            d.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            alertBox.prepend(d);
        }

        // Game Loop
        function loop() {
            activeObjects = activeObjects.filter(obj => !obj.isDead);
            activeObjects.forEach(obj => obj.update());
            requestAnimationFrame(loop);
        }

        loop();
    </script>
