<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Smart Earbuds Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>SOUND WAY</h1>
    <h2>แบบจำลองหูฟัง AI นำทาง</h2>

    <div class="controls">
        <button onclick="spawnObject('รถยนต์', -150, -300, 2)">จำลองรถมาทางซ้าย</button>
        <button onclick="spawnObject('คนเดิน', 100, -250, 1)">จำลองคนมาทางขวา</button>
        <button onclick="spawnObject('เสาไฟฟ้า', 0, -200, 0)">จำลองเสาตรงกลาง</button>
        <button onclick="spawnRandomObject()">🎲 สุ่มวัตถุ (Random)</button>
    </div>

    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div id="alertBox"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const alertBox = document.getElementById('alertBox');

        // ข้อมูลผู้ใช้ (อยู่กึ่งกลางจอด้านล่าง)
        const user = { x: 300, y: 350, radius: 15 };
        let objects = [];

        // ฟังก์ชันสร้างวัตถุ
        function spawnObject(name, offsetX, offsetY, speed) {
            objects.push({
                id: Date.now(),
                name: name,
                x: user.x + offsetX,
                y: user.y + offsetY,
                speed: speed,
                detectedAI: false, // สถานะการตรวจจับของกล้อง (ระยะไกล)
                detectedToF: false // สถานะการตรวจจับของ ToF (ระยะประชิด)
            });
            logMessage(`[System] จำลอง ${name} เข้าสู่พื้นที่`, 'white');
        }

        // ฟังก์ชันเขียน Log ลงบนจอ
        function logMessage(msg, colorClass) {
            const time = new Date().toLocaleTimeString();
            const p = document.createElement('div');
            p.className = colorClass;
            p.innerHTML = `[${time}] ${msg}`;
            alertBox.prepend(p); // ใส่ข้อความใหม่ไว้บนสุด
        }

        // ฟังก์ชันสุ่มวัตถุโผล่มาในฉาก
        function spawnRandomObject() {
            // ฐานข้อมูลวัตถุจำลองและความเร็ว
            const objectDatabase = [
                { name: 'มอเตอร์ไซค์', minSpeed: 2.5, maxSpeed: 4 },
                { name: 'จักรยาน', minSpeed: 1.5, maxSpeed: 2.5 },
                { name: 'สุนัข', minSpeed: 1, maxSpeed: 3 },
                { name: 'คนวิ่ง', minSpeed: 2, maxSpeed: 3 },
                { name: 'ถังขยะ', minSpeed: 0, maxSpeed: 0 }, // วัตถุอยู่นิ่ง
                { name: 'ป้ายทางเท้า', minSpeed: 0, maxSpeed: 0 }
            ];

            // สุ่มเลือกวัตถุ 1 อย่าง
            const randomObj = objectDatabase[Math.floor(Math.random() * objectDatabase.length)];

            // สุ่มตำแหน่ง X (ซ้ายสุดถึงขวาสุด เทียบกับตัวผู้ใช้)
            // ให้ค่าอยู่ระหว่าง -250 ถึง +250
            const randomOffsetX = (Math.random() * 500) - 250;

            // สุ่มตำแหน่ง Y (ให้โผล่มาจากขอบจอด้านบน ไกลๆ)
            const randomOffsetY = -350 - (Math.random() * 100);

            // สุ่มความเร็วตามช่วงที่กำหนดไว้
            const randomSpeed = Math.random() * (randomObj.maxSpeed - randomObj.minSpeed) + randomObj.minSpeed;

            // เรียกใช้ฟังก์ชันสร้างวัตถุเดิม
            spawnObject(randomObj.name, randomOffsetX, randomOffsetY, randomSpeed);
        }

        // Game Loop ทำงานทุกๆ เฟรม
        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // วาดขอบเขต AI Camera (ระยะไกล)
            ctx.beginPath();
            ctx.arc(user.x, user.y, 250, Math.PI, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 217, 112, 0.555)';
            ctx.fill();
            
            // วาดขอบเขต ToF (ระยะประชิด)
            ctx.beginPath();
            ctx.arc(user.x, user.y, 80, Math.PI, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 50, 50, 0.2)';
            ctx.fill();
            
            // วาดผู้ใช้
            ctx.beginPath();
            ctx.arc(user.x, user.y, user.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'gray';
            ctx.fill();
            ctx.closePath();

            // อัปเดตตำแหน่งและตรวจสอบวัตถุ
            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];

                // วัตถุเคลื่อนที่เข้าหาผู้ใช้
                if (obj.speed > 0) {
                    let dx = user.x - obj.x;
                    let dy = user.y - obj.y;
                    let angle = Math.atan2(dy, dx);
                    obj.x += Math.cos(angle) * obj.speed;
                    obj.y += Math.sin(angle) * obj.speed;
                } else {
                    // จำลองผู้ใช้เดินไปหาเสา (ให้เสาเลื่อนลงมา)
                    obj.y += 1; // ความเร็วของการเลื่อนลงมา (จำลองการเดินของผู้ใช้)
                }

                // คำนวณระยะทาง
                let dist = Math.hypot(user.x - obj.x, user.y - obj.y);

                // ตรวจสอบตำแหน่งซ้าย/ขวา
                let direction = obj.x < user.x ? 'ซ้าย' : (obj.x > user.x ? 'ขวา' : 'ตรงหน้า');

                // 1. Online Mode (AI Camera) - ตรวจจับระยะไกล < 250px
                if (dist < 250 && !obj.detectedAI) {
                    obj.detectedAI = true;
                    logMessage(`🔊 [AI Spatial Voice]: "มี ${obj.name} อยู่ทาง${direction}"`, 'alert-ai');
                }

                // 2. Offline Mode (ToF / mmWave) - ตรวจจับระยะประชิด < 80px
                if (dist < 80 && !obj.detectedToF) {
                    obj.detectedToF = true;
                    logMessage(`🚨 [Offline BEEP!]: ดังถี่ๆ ที่หูข้าง${direction} (${obj.name} ประชิดตัว!)`, 'alert-tof');
                }

                // วาดวัตถุ
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = obj.detectedToF ? 'red' : (obj.detectedAI ? 'orange' : 'gray');
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.fillText(obj.name, obj.x - 15, obj.y - 15);
                ctx.closePath();

                // ลบวัตถุที่ผ่านตัวไปแล้ว
                if (obj.y > user.y + 50) {
                    objects.splice(i, 1);
                }

                // 3. Collision Detection - ตรวจจับการชน (ระยะ < รัศมีตัวผู้ใช้)
                if (dist < user.radius + 5) { // +5 เพื่อให้ดูเหมือนชนขอบตัว
                    logMessage(`💥 [Collision]: ชนกับ ${obj.name} แล้ว!`, 'white');
                    objects.splice(i, 1); // ลบวัตถุออกจาก Array ทันที
                    continue; // ข้ามไปประมวลผลวัตถุถัดไป
                }
            }

            requestAnimationFrame(update);
        }

        // เริ่ม Game Loop
        update();
    </script>

</body>

</html>
