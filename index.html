<html lang="th">

<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="web.css">
</head>

<body>
    <!-- nav bar -->
    <nav>
        <div class="logo">
            <a href="#home"><img src="img/SOUND WAY_white.svg" alt="Sound Way Logo"></a>
        </div>
        <div class="hamberger" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
        <div>
            <ul class="nav-list">
                <a href="#home">HOME</a>
                <a href="#simulation">SIMULATION</a>
                <a href="#contract">CONTACT</a>
            </ul>
        </div>
        <div class="acount">
            <button class="login-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-box-arrow-in-right"
                    viewBox="0 0 16 16">
                    <path fill-rule="evenodd"
                        d="M6 3.5a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-2a.5.5 0 0 0-1 0v2A1.5 1.5 0 0 0 6.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2h-8A1.5 1.5 0 0 0 5 3.5v2a.5.5 0 0 0 1 0z" />
                    <path fill-rule="evenodd"
                        d="M11.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 1 0-.708.708L10.293 7.5H1.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z" />
                </svg>
            </button>
            <button class="signup-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-person-circle"
                    viewBox="0 0 16 16">
                    <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
                    <path fill-rule="evenodd"
                        d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- main -->
    <main id="home">
        <div class="carousel" id="slider">
            <img class="card" src="img/hero1.jpg" alt="">
            <img class="card" src="img/hero2.jpg" alt="">
            <img class="card" src="img/hero3.jpg" alt="">
            <img class="card" src="img/hero4.jpg" alt="">
            <img class="card" src="img/hero5.jpg" alt="">
        </div>

        <div class="product-wrapper">
            <div class="product">
                <img src="img/product_img.png" alt="soundway product">
                <button class="descriptProductCard dataCard" data-feature="1" type="button"></button>
                <button class="descriptProductCard dataCard" data-feature="2" type="button"></button>
                <button class="descriptProductCard dataCard" data-feature="3" type="button"></button>
                <button class="descriptProductCard dataCard" data-feature="4" type="button"></button>
                <button class="descriptProductCard dataCard" data-feature="5" type="button"></button>
            </div>
            <div id="cardBox" class="local-card">
                <h2 id="cardTitle">Feature Detail</h2>
                <p id="typing-text"></p>
            </div>
    </main>

    <section id="simulation">
        <div class="leftside">
            <div class="dot-wrap">
                <button class="dot"></button>
                <button class="dot"></button>
                <button class="dot"></button>
            </div>
            <h1>Welcome to Smart Headphones 🎧<br> Simulation</h1>
            <p>Experience the future of sound with our cutting-edge earbuds simulation. Explore the features and
                capabilities of our smart earbuds in a virtual environment. <br><br>🚧🏃🚌🛤️🏗️🤖👇👇
            </p>
        </div>
    </section>

    <section class="simulation">
        <div class="controls">
            <button onclick="spawn('รถยนต์')">🚗</button>
            <button onclick="spawn('คนเดิน')">🚶</button>
            <button onclick="spawn('กระจกใส')">🪞</button>
            <button onclick="spawnRandom()">🎲 Random</button>
        </div>
        <div id="radar-screen">
            <div class="way"><h1 id="way">❯❯❯❯</h1></div>
            <div class="canvas"></div>
            <div class="zone cloneAi"></div>
            <div class="zone cloneTof"></div>
            <div id="ai-circle" class="zone zone-ai"></div>
            <div id="tof-circle" class="zone zone-tof"></div>
            <img src="img/stand.png" id="user-element" class="user" alt="user">
        </div>
        <div id="alertBox"></div>
    </section>
    </section>
